<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>视觉人格：你的波点宇宙投影</title>
  <style>
    /* ============================================================
       CSS Reset & 全局基础
       ============================================================ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-image: radial-gradient(#FFA4BC 20%, transparent 20%), radial-gradient(#FFA4BC 20%, transparent 20%);
      background-size: 30px 30px;
      background-position: 0 0, 15px 15px;
      background-color: #FFEBF0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    #app {
      width: 100%;
      max-width: 480px;
    }

    /* ─── Screen 通用布局 ─── */
    .screen {
      display: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .screen--active {
      display: flex;
      flex-direction: column;
      opacity: 1;
    }

    /* ─── 通用按钮 ─── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 14px 36px; border: none; border-radius: 28px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: all 0.35s ease; letter-spacing: 1px;
      position: relative; overflow: hidden;
    }
    .btn--primary {
      background: linear-gradient(135deg, #FFA4BC 0%, #FF69B4 50%, #FF8FA3 100%);
      color: #FFFFFF; font-weight: 700;
      box-shadow: 0 4px 20px rgba(255,105,180,0.3);
      border: 1px solid rgba(255,255,255,0.3);
    }
    .btn--primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,105,180,0.4); }
    .btn--primary:active { transform: scale(0.97); }
    .btn--secondary {
      background: #FFF0F3; color: #D4687C;
      border: 1px solid rgba(255,154,180,0.3);
    }
    .btn--secondary:hover { background: #FFE5EC; border-color: rgba(255,154,180,0.5); }
    .btn--pulse {
      animation: btnPulsePink 2.5s ease-in-out infinite;
    }
    @keyframes btnPulsePink {
      0%, 100% { box-shadow: 0 4px 20px rgba(255,182,193,0.3); }
      50% { box-shadow: 0 4px 40px rgba(255,105,180,0.6), 0 0 30px rgba(255,182,193,0.25); }
    }

    /* ============================================================
       欢迎页
       ============================================================ */
    #screen-welcome {
      justify-content: center; align-items: center;
      min-height: 100vh;
      background: radial-gradient(ellipse at 30% 20%, rgba(255,154,180,0.10) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 80%, rgba(255,105,180,0.06) 0%, transparent 50%),
                  linear-gradient(180deg, #FFEBF0 0%, #FFF0F3 100%);
    }
    .welcome-bg-dots {
      position: absolute; inset: 0; pointer-events: none;
      background-image:
        radial-gradient(circle at center, rgba(255,164,188,0.25) 5px, transparent 5px),
        radial-gradient(circle at center, rgba(255,105,180,0.12) 4.5px, transparent 4.5px);
      background-size: 60px 60px, 60px 60px;
      background-position: 0 0, 30px 30px;
      animation: bgDotsFloat 28s linear infinite;
    }
    @keyframes bgDotsFloat {
      0%   { background-position: 0 0, 30px 30px; }
      100% { background-position: 60px 60px, 90px 90px; }
    }
    .welcome-content { position: relative; z-index: 1; text-align: center; padding: 0 32px; }
    .welcome-title { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
    .welcome-title__sub {
      font-size: 10px; letter-spacing: 5px; color: rgba(255,105,180,0.5);
      text-transform: uppercase; font-weight: 400;
    }
    .welcome-title__main {
      font-size: 52px; font-weight: 900; line-height: 1.15;
      background: linear-gradient(135deg, #FFA4BC 0%, #FF69B4 25%, #E8468A 50%, #FF8FA3 75%, #D4687C 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 10px rgba(255,105,180,0.2));
    }
    .welcome-title__desc { font-size: 17px; font-weight: 400; color: #8E707E; letter-spacing: 3px; opacity: 0.85; }
    .welcome-tagline { font-size: 14px; color: rgba(180,120,140,0.6); margin-bottom: 56px; line-height: 1.7; font-weight: 300; letter-spacing: 1px; }

    /* ============================================================
       答题页
       ============================================================ */
    #screen-quiz { padding: 24px 20px 0; background: transparent; }
    .quiz-card__wrapper {
      flex: 1; width: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 28px 20px 24px; margin-top: 8px;
      background: #FFFFFF;
      border-radius: 24px;
      border: 1px solid rgba(255,164,188,0.15);
      box-shadow: 0 4px 32px rgba(255,154,180,0.1);
    }
    .quiz-progress { width: 100%; display: flex; align-items: center; gap: 14px; margin-bottom: 36px; }
    .quiz-progress__bar { flex: 1; height: 4px; background: rgba(255,164,188,0.12); border-radius: 2px; overflow: visible; position: relative; }
    .quiz-progress__fill {
      height: 100%; border-radius: 2px; width: 0%; position: relative;
      transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      background: linear-gradient(90deg, #FFDEE9, #FFB6C1, #FF69B4, #DDA0DD);
    }
    .quiz-progress__fill::after {
      content: ''; position: absolute; right: -5px; top: 50%; transform: translateY(-50%);
      width: 10px; height: 10px; border-radius: 50%; background: #FFB6C1;
      box-shadow: 0 0 8px rgba(255,182,193,0.8), 0 0 20px rgba(255,105,180,0.6), 0 0 36px rgba(255,105,180,0.3);
      animation: progressGlow 2s ease-in-out infinite;
    }
    @keyframes progressGlow {
      0%, 100% { box-shadow: 0 0 6px rgba(255,182,193,0.6), 0 0 16px rgba(255,105,180,0.4); }
      50% { box-shadow: 0 0 12px rgba(255,182,193,1), 0 0 30px rgba(255,105,180,0.8), 0 0 50px rgba(255,105,180,0.4); }
    }
    .quiz-progress__text { font-size: 12px; color: rgba(200,120,140,0.6); min-width: 48px; text-align: right; letter-spacing: 1px; font-weight: 500; }
    .quiz-card { width: 100%; display: flex; flex-direction: column; align-items: center; opacity: 0; transform: translateX(36px); transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
    .quiz-card--enter { opacity: 1; transform: translateX(0); }
    .quiz-card__number { font-size: 12px; font-weight: 700; color: #E8468A; letter-spacing: 3px; margin-bottom: 14px; padding: 4px 16px; border-radius: 20px; background: rgba(255,164,188,0.12); border: 1px solid rgba(255,154,180,0.2); }
    .quiz-card__title { font-size: 20px; font-weight: 700; text-align: center; color: #2D1A26; margin-bottom: 40px; line-height: 1.7; max-width: 380px; letter-spacing: 0.5px; }
    .quiz-card__options { width: 100%; display: flex; flex-direction: column; gap: 12px; }
    .quiz-option {
      display: flex; align-items: flex-start; gap: 14px;
      width: 100%; padding: 16px 18px;
      border: 1.5px solid rgba(255,164,188,0.2); border-radius: 16px;
      background: #FAFAFA; color: #4A3040;
      font-size: 14px; cursor: pointer;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      text-align: left; position: relative; overflow: hidden;
    }
    .quiz-option::before {
      content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 3px; border-radius: 0 2px 2px 0; background: transparent; transition: background 0.35s ease;
    }
    .quiz-option:hover { border-color: rgba(255,105,180,0.5); background: #FFF0F3; transform: translateX(4px); box-shadow: 0 4px 16px rgba(255,154,180,0.1); }
    .quiz-option:hover::before { background: #FFA4BC; }
    .quiz-option:active { transform: scale(0.98); }
    .quiz-option--selected { border-color: #FFA4BC; background: rgba(255,164,188,0.15); box-shadow: 0 0 0 1px rgba(255,105,180,0.2), 0 4px 20px rgba(255,154,180,0.12); }
    .quiz-option--selected::before { background: #FF69B4; box-shadow: 0 0 10px rgba(255,105,180,0.4); }
    .quiz-option:disabled { pointer-events: none; opacity: 0.45; filter: grayscale(0.3); }
    .quiz-option__label {
      display: flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(255,164,188,0.15); font-size: 13px; font-weight: 700;
      flex-shrink: 0; color: #D4687C; border: 1px solid rgba(255,164,188,0.25);
      transition: all 0.35s ease; margin-top: 1px;
    }
    .quiz-option--selected .quiz-option__label {
      background: linear-gradient(135deg, #FFA4BC, #FF69B4); color: #FFFFFF;
      border-color: transparent; box-shadow: 0 2px 10px rgba(255,105,180,0.3);
    }
    .quiz-option__text { flex: 1; line-height: 1.55; color: #4A3040; transition: color 0.3s ease; }
    .quiz-option--selected .quiz-option__text { color: #2D1A26; }

    /* ============================================================
       Loading 页
       ============================================================ */
    #screen-loading { justify-content: center; align-items: center; min-height: 100vh; background: radial-gradient(ellipse at center, #FFF0F3 0%, #FFEBF0 70%); }
    .loading-container { text-align: center; }
    .loading-dots { display: flex; gap: 12px; justify-content: center; margin-bottom: 36px; }
    .loading-dots span { width: 16px; height: 16px; border-radius: 50%; animation: dotBouncePink 1.3s ease-in-out infinite; }
    .loading-dots span:nth-child(1) { animation-delay: 0s;    background: #FFDEE9; box-shadow: 0 0 12px rgba(255,164,188,0.4); }
    .loading-dots span:nth-child(2) { animation-delay: 0.15s; background: #FFB6C1; box-shadow: 0 0 12px rgba(255,105,180,0.4); }
    .loading-dots span:nth-child(3) { animation-delay: 0.3s;  background: #FF69B4; box-shadow: 0 0 12px rgba(255,105,180,0.45); }
    .loading-dots span:nth-child(4) { animation-delay: 0.45s; background: #DDA0DD; box-shadow: 0 0 12px rgba(221,160,221,0.4); }
    .loading-dots span:nth-child(5) { animation-delay: 0.6s;  background: #BF5FFF; box-shadow: 0 0 12px rgba(191,95,255,0.4); }
    @keyframes dotBouncePink {
      0%, 80%, 100% { transform: scale(0.5); opacity: 0.35; }
      40% { transform: scale(1.35); opacity: 1; }
    }
    .loading-text { font-size: 16px; color: #D4687C; letter-spacing: 1.5px; font-weight: 400; }
    .loading-ellipsis { display: inline-block; animation: ellipsis 1.5s steps(4, end) infinite; overflow: hidden; vertical-align: bottom; }
    @keyframes ellipsis {
      0%   { width: 0ch; } 25%  { width: 1ch; }
      50%  { width: 2ch; } 75%  { width: 3ch; }
      100% { width: 0ch; }
    }

    /* ============================================================
       结果页 — 终极商业版不透明白卡片体系
       ============================================================ */
    #screen-result {
      justify-content: flex-start;
      align-items: center;
      width: 100%;
      padding: 0;
    }

    /* 核心死命令：绝对不透明独立高级白卡片 */
    .result-card {
      background-color: #FFFFFF !important;
      color: #1A1A1A !important;
      max-width: 480px;
      width: 100%;
      margin: 20px auto 40px;
      border-radius: 28px;
      padding: 35px 25px 30px;
      box-shadow: 0 20px 45px rgba(255, 164, 188, 0.35);
      box-sizing: border-box;
      overflow: hidden;
    }
    .result-card h1, .result-card h2, .result-card h3, .result-card h4,
    .result-card p, .result-card div, .result-card span, .result-card li {
      color: #1A1A1A !important;
      line-height: 1.8;
    }

    /* Canvas 艺术画布容器 */
    .canvas-art-wrapper {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 18px 0 8px;
    }
    .canvas-art-wrapper canvas {
      display: block;
      background: #FFF8FA !important;
      border-radius: 16px;
      border: 1px solid #FFE3E8;
      max-width: 100%;
      height: auto;
    }

    /* 工业说明书 */
    .spec-box {
      background-color: #FFF8FA !important;
      border-radius: 16px;
      padding: 16px 18px;
      margin: 20px 0;
      border: 1px solid #FFE3E8;
    }
    .spec-item {
      display: flex;
      justify-content: space-between;
      padding: 9px 0;
      border-bottom: 1px dashed #FFE3E8;
      font-size: 13px;
    }
    .spec-item:last-child { border-bottom: none; }
    .spec-item span:first-child { color: #8E707E; }
    .spec-item span:last-child { font-weight: 700; color: #2D1A26; }

    /* 穿搭空间美学 */
    .style-tip-box {
      background: linear-gradient(135deg, #FFF0F3 0%, #FFE5EC 100%) !important;
      border-left: 5px solid #FF758F;
      padding: 18px 20px;
      border-radius: 0 16px 16px 0;
      margin: 22px 0;
      font-size: 14px;
      line-height: 1.9;
    }

    /* 分析标题 */
    .analysis-title {
      border-bottom: 2px solid #FFE5EC;
      padding-bottom: 6px;
      font-size: 16px;
      font-weight: 700;
      color: #2C000E !important;
      margin-top: 28px;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }
    .analysis-title:first-of-type { margin-top: 0; }
    .analysis-text {
      font-size: 14px;
      color: #3A2A32 !important;
      line-height: 2.0;
      margin: 10px 0 8px;
      text-align: justify;
      letter-spacing: 0.3px;
    }

    /* 红黑榜单 */
    .match-box {
      border-radius: 16px;
      padding: 16px 18px;
      margin: 14px 0;
    }
    .match-box--red {
      background: linear-gradient(135deg, #FFF0F3, #FFE8EE) !important;
      border: 1px solid rgba(255,105,180,0.2);
    }
    .match-box--black {
      background: #FAFAFA !important;
      border: 1px solid rgba(180,180,180,0.25);
    }
    .match-box__icon { font-size: 18px; margin-right: 6px; }
    .match-box__title {
      font-weight: 700; font-size: 15px; margin-bottom: 8px;
      color: #2D1A26 !important;
    }
    .match-box p {
      font-size: 13px; color: #5A4048 !important;
      line-height: 1.9; margin: 0;
    }

    /* 维护建议列表 */
    .advice-list {
      list-style: none; padding: 0; margin: 10px 0;
    }
    .advice-list li {
      padding: 14px 16px; margin-bottom: 10px;
      background: #FFF8FA !important;
      border-radius: 14px; border: 1px solid #FFE3E8;
      font-size: 14px; line-height: 1.85;
      color: #3A2A32 !important;
    }
    .advice-list li strong {
      color: #D4687C !important;
      display: block; margin-bottom: 4px; font-size: 15px;
    }

    /* 宇宙宣言底部 */
    .cosmic-footer {
      border-top: 2px dashed #FFE5EC;
      margin-top: 32px; padding-top: 22px;
      text-align: center; font-size: 11px;
      color: #B894A2 !important;
      line-height: 2.0; letter-spacing: 0.5px;
    }

    /* 操作按钮 */
    .result-actions-new {
      display: flex; gap: 12px; margin-top: 24px;
    }
    .result-actions-new .btn { flex: 1; }

    /* ─── 响应式 ─── */
    @media (max-width: 400px) {
      .result-card {
        border-radius: 20px; padding: 28px 16px 24px;
      }
      .canvas-art-wrapper canvas {
        width: 100%; height: auto;
      }
    }
  </style>
</head>
<body>

  <div id="app">
    <!-- 1. 欢迎页 -->
    <section id="screen-welcome" class="screen screen--active">
      <div class="welcome-bg-dots"></div>
      <div class="welcome-content">
        <h1 class="welcome-title">
          <span class="welcome-title__sub">Polka Dot Personality Quiz</span>
          <span class="welcome-title__main">视觉人格</span>
          <span class="welcome-title__desc">你的波点宇宙投影</span>
        </h1>
        <p class="welcome-tagline">12 道题，探索你灵魂深处的波点频率</p>
        <button id="btn-start" class="btn btn--primary btn--pulse">开始测试</button>
      </div>
    </section>

    <!-- 2. 答题页 -->
    <section id="screen-quiz" class="screen">
      <div class="quiz-progress">
        <div class="quiz-progress__bar">
          <div id="progress-fill" class="quiz-progress__fill"></div>
        </div>
        <span id="progress-text" class="quiz-progress__text">1 / 12</span>
      </div>
      <div class="quiz-card__wrapper">
        <div id="quiz-card" class="quiz-card">
          <div class="quiz-card__number" id="quiz-number">Q1</div>
          <h2 class="quiz-card__title" id="quiz-title">题目占位</h2>
          <div class="quiz-card__options" id="quiz-options"></div>
        </div>
      </div>
    </section>

    <!-- 3. Loading 页 -->
    <section id="screen-loading" class="screen">
      <div class="loading-container">
        <div class="loading-dots">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <p class="loading-text">正在计算你的波点密度<span class="loading-ellipsis">...</span></p>
      </div>
    </section>

    <!-- 4. 结果页（动态渲染，无需预置结构） -->
    <section id="screen-result" class="screen"></section>
  </div>

  <script>
    /* ============================================================
       🎯 视觉人格：你的波点宇宙投影
       零外部依赖 · 纯原生 CSS 渲染 · 绝对安全兜底
       ============================================================ */

    /* ── 五维维度常量 ── */
    const DIMENSIONS = ['presence', 'density', 'order', 'margin', 'fluctuation'];
    const DIM_LABELS = { presence: '占位度', density: '高密感', order: '秩序力', margin: '呼吸率', fluctuation: '浮游感' };
    const DIM_DESCS = {
      presence:    '社交存在感、表现欲、能量场 → 波点大小',
      density:     '思考深度、情感细腻度、精神内耗 → 波点密度',
      order:       '逻辑、强迫症倾向、对规则的依赖 → 波点排列',
      margin:      '边界感、松弛感、个人空间需求 → 波点间距',
      fluctuation: '跳跃思维、情绪波动、不可预测性 → 波点动态'
    };

    /* ── 12 道测试题 ── */
    const QUESTIONS = [
      { id:1, title:"如果你的灵魂此刻被允许变成一种声音，掉进平静的水里，你觉得会发出什么？", options:[
        { label:"A", text:"咕嘟一声！炸开一个巨大、突兀且不容忽视的水泡", weight:{ presence:15, density:-5, order:-5, margin:10, fluctuation:5 } },
        { label:"B", text:"细密如香槟的气泡，在水面泛起连绵不断的、神经质的沙沙声", weight:{ presence:-5, density:15, order:5, margin:-10, fluctuation:10 } },
        { label:"C", text:"啪嗒。极其清脆的单音，水面只泛起一圈一圈绝对平行的涟漪", weight:{ presence:5, density:-10, order:15, margin:15, fluctuation:-10 } }
      ]},
      { id:2, title:"深夜失眠，你死死盯着房间的天花板，在你的想象中那里正在发生什么？", options:[
        { label:"A", text:"黑暗像浓稠的墨汁一样，大块大块、毫无章法地在头顶晕染开来", weight:{ presence:10, density:5, order:-15, margin:-5, fluctuation:15 } },
        { label:"B", text:"有无数个肉眼看不见的隐形小人，正踩着极其严丝合缝的鼓点在跳踢踏舞", weight:{ presence:-5, density:10, order:20, margin:-10, fluctuation:-5 } },
        { label:"C", text:"什么都没有，只有无尽的留白，和空气在失重状态下缓慢地漂浮", weight:{ presence:-15, density:-15, order:0, margin:20, fluctuation:5 } }
      ]},
      { id:3, title:"一只野生的猫咪突然打翻了你的墨水瓶，踩得满地都是黑脚印，你的第一本能是？", options:[
        { label:"A", text:"血压飙升！但一秒后突然觉得这些杂乱无章的脚印组成了一幅绝妙的野生抽象画", weight:{ presence:10, density:-5, order:-15, margin:5, fluctuation:20 } },
        { label:"B", text:"瞬间头大，立刻拿来纸巾，试图把那些破坏了地板原本洁净秩序的混乱脚印精准擦掉", weight:{ presence:-5, density:5, order:20, margin:-5, fluctuation:-15 } },
        { label:"C", text:"叹口气，静静地蹲下来看着猫，心想：它活在它的世界里，我活在我的世界里，挺好", weight:{ presence:-10, density:10, order:-5, margin:15, fluctuation:0 } }
      ]},

        coreMonologue:'你拥有这个世界上最精密的一台精神显微镜。别人看到一杯水，你看到的是水中悬浮的每一粒微尘的布朗运动轨迹。别人听到一句"你今天看起来不错"，你会在接下来的三小时内逐帧分析这句话的语调、停顿、眼神偏移角度，以及对方说这句话时左手小指是否比平时多弯曲了 2 度。你的大脑是一台永不停机的超级计算机，输入的是日常生活的像素级碎片，输出的是一部关于人际关系、宇宙真理、以及薯片为什么是这个形状的宏大学术论文。\n\n深夜是你真正的清醒时刻。白天的你像一个正常人类一样社交、工作、微笑，但一到凌晨一点，你的精神世界就像被按下了"全部启动"的按钮。你开始回放今天下午同事那句"好的"到底是真的好还是敷衍的好，你开始思考三年前那个没回你消息的朋友是不是其实一直讨厌你，你开始在脑子里列一份关于"如何在下周二之前成为一个更好的人"的 47 条执行清单。表面上你只是静静地躺着，眼睛盯着天花板，但你的大脑皮层此刻的活跃程度堪比一场跨年烟花秀。\n\n在恋爱中你是一个"过度解读大师"。对方三分钟没回消息，你已经在自己脑子里上演了从"他是不是出车祸了"到"他是不是不爱我了"再到"没关系我一个人也可以过得很好我会养一只猫叫玛格丽特"的完整电影剧本。但当你终于收到那条消息——"刚在洗澡"——你瞬间从悲剧片切换成爱情喜剧，并为自己刚才所有的内心戏感到一丝不好意思的甜蜜。你不是作，你只是太在乎。你的每一根神经末梢都在为爱值班，24 小时无休。\n\n工作里的你是团队里最容易内耗但也是最靠谱的那一个。你会把一份三页的 PPT 逐像素调整到凌晨四点，因为那个图标的阴影偏了 0.5 毫米，别人根本看不出来，但你看得出来——它在你眼里像一面白墙上的一只巨大蜘蛛。你的交付质量永远远超预期，但你为此付出的精神代价也远超常人。你是一台精密度量衡，但你也需要知道：不是所有东西都需要被测量到小数点后八位。有些美好恰恰在于它的模糊和不确定。',
        dimensionAnalysis:'高密感满分（精神内耗与思考高频震荡）、秩序力极高（试图用细节的完美来抵抗内心的不安全感）、呼吸率极低（脑子里塞得太满，没有留白）。',
        socialGuide:'你最需要【失重水母】的治愈——她能带你逃离高频自转的内耗；和【野生波普】在一起会让你抓狂，因为你理不顺他跳跃的线头。',
        selfRescue:'别再用放大镜去审视生活里的每一个像素点了！生活是用来过的，不是用来解构的。学着把视线拉远，你会发现那些让你内耗的细密针尖，其实只是一片好看的云。',
        visual:{ dotSize:'tiny', density:'very_high', order:'semi_grid', margin:'tight', fluctuation:'medium', colorTheme:'deep_purple' },
        styleAndSpace:'【时尚单品版型】你的外在应该是"温柔的铠甲"。推荐高支数精纺羊毛的极简廓形大衣（烟灰、燕麦或炭黑色），剪裁利落到没有一丝多余线条，但内搭一定要有心机——一件细密千鸟格的衬衫、一条像素级精密编织的针织半裙，或者一枚藏在领口内侧、只有你自己知道的微型珍珠胸针。你的高级感不来自张扬，而来自那种"凑近了看才发现全是细节"的精致内功。鞋子推荐线条干净的方头短靴或乐福鞋，材质可以是哑光小牛皮，低调但有分量。\n\n【撞色公式】灰调莫兰迪色系为主场：鼠尾草绿 × 雾霾蓝、燕麦色 × 干枯玫瑰粉、炭灰 × 象牙白。用材质的光泽差异制造层次感，而不是用颜色打架。\n\n【精神卧室空间】你需要一个"视觉降噪"的庇护所。墙壁刷成温柔的米灰色或极浅的鼠尾草绿，床品必须是高支数纯棉——你能感受到每一根纤维的密度。书桌上放一盏色温可调的台灯，暖黄光是你深夜思绪的安全气囊。书架按颜色渐变排列，抽屉里的文具按使用频率分区。但请在床头柜上故意放一件"不完美"的东西：一个歪歪扭扭的手捏陶杯，或者一片捡来的形状奇怪的树叶——那是你留给自己的温柔破绽，提醒你：不需要所有东西都整整齐齐，你本身已经足够好了。',
        redMatch:{ title:'灵魂互补的绝对撞色织物', partner:'错位时空的野生波普艺术', desc:'她是你精密世界里的那一道美丽裂痕。你花了三个小时把房间收拾得一尘不染，她走进来十分钟就能制造出让你血压飙升的"可控混乱"——但神奇的是，你居然不讨厌。因为她不是不尊重你的秩序，而是用一种你无法预测的方式，在你的网格里画了一条歪歪扭扭但可爱到犯规的彩虹。她会拉着你在周三下午翘班去看一场莫名其妙的展览，你嘴上说着"这太不高效了"，脚却已经跟着她走出了门。她是你所有精密计算里唯一一个你愿意接受的"误差项"——不是因为她不重要，而是因为她让你明白：有些东西不需要被计算，它们只需要被感受。' },
        blackMatch:{ title:'频率排斥的格式化剪刀', partner:'包豪斯乐园的铁面法官', desc:'你们看起来像是同一类人——都爱整洁、都讲究秩序、都有自己的一套系统。但问题恰恰在于：你们的系统不兼容。你的秩序是为了给自己安全感，他的秩序是为了控制周围的一切。你叠衣服是按颜色渐变，他叠衣服是按"规定的方式"，并且会要求你也按他的方式来。你本来就已经够内耗了，和他在一起你会陷入"我是不是还不够好"的自我怀疑漩涡。他的存在像一面过于清晰的镜子，反射出的不是你，而是他希望你成为的样子。远离他，不是因为你脆弱，而是因为你不需要第二份内耗——你自己的那一份已经够你忙的了。' },
        advices:[
          { title:'给你的"显微镜"放个假', body:'你的高敏感是一种超能力，但超能力也需要冷却时间。每天给自己设置一个"不思考时段"：比如洗澡的时候只感受水温，吃饭的时候只品尝味道，走路的时候只看路边的树。把大脑从"分析模式"强行切换到"感受模式"，哪怕只有 15 分钟。你会惊讶地发现，那些你以为必须想通的问题，在你不去想的时候，反而自动解开了。大脑不是越转越快越好，有时候，停下来才是最高效的运转方式。' },
          { title:'练习"差不多就好"的艺术', body:'下周挑一件不重要的事情，故意做到 80 分就停手。比如回复一封不那么紧急的邮件，不要检查三遍，一遍就发送。你会发现：天没有塌下来，没有人因此讨厌你，世界照常运转。你的"完美"从来不是为了别人，而是你自己给自己设定的一场永远不会赢的比赛。退出这场比赛不是认输，是终于意识到——你早就不需要靠完美来证明自己值得被爱了。' },
          { title:'在关系里练习"不去解读"', body:'下次当你在等一条消息而开始脑补一百种剧情的时候，试试对自己说："我不知道他在想什么，这没关系。"然后去做一件完全不相干的事——泡杯茶、看一集动画、或者给一盆植物浇水。把注意力从"他"拉回到"我"，不是不在乎，而是把在乎的力气用在对的地方。爱你的人不需要被你逐帧分析，他的爱会在时间里自然展开——你不需要用显微镜去找，用眼睛看就够了。' }
        ]
      },
      order: {
        title:'包豪斯乐园的铁面法官',
        enTitle:'The Strict Bauhaus Dot',
        typeSub:'绝对等距、几何网格严密对齐、极具现代工业感与古典理性的撞色硬核波点',
        visualImagery:'绝对等距、几何网格严密对齐、极具现代工业感与古典理性的撞色硬核波点',
        tags:['秩序守护者','强迫症晚期','古典主义','逻辑铁壁','排列组合大师'],
        coreMonologue:'你是这个混乱世界里最后一道坚不可摧的逻辑防线。当所有人都在随波逐流、感性用事、被情绪裹挟的时候，你像一座冷静的灯塔，用铁一般的理性照亮迷雾。你的内心运行着一套极其精密的操作系统：衣柜按色相环排列、书架按杜威十进制分类、日程表精确到 15 分钟为单位。这些在别人看来是"强迫症"的东西，对你来说是一个人在宇宙面前维持尊严的最后堡垒——外面可以狂风暴雨，但我内心的网格绝不偏移一格。\n\n在深夜，当世界安静下来，你的精神活动反而进入最高效的区间。你会复盘今天的所有决策，像一位严厉的法官审视每一个逻辑漏洞。那封邮件第三段的措辞是否不够严谨？那个会议上提出的时间节点是否过于乐观？你享受这种"事后审计"的过程，因为它让你感觉一切仍在掌控之中。但这种掌控感的背面，是一种你自己都不愿意承认的疲惫——你太习惯做那个"靠谱的人"了，以至于忘了问自己：我什么时候可以不当法官，只当一个人？\n\n恋爱中的你是一个"条款明晰派"。你不喜欢猜来猜去，你希望关系像一份设计精良的合同：双方的权利义务清晰、沟通渠道畅通、冲突解决机制完善。你不是不浪漫，你的浪漫藏在那些极其具体的细节里：记得她随口说过喜欢某种花，三个月后在她生日那天准时出现在她的办公桌上；每次约会提前十分钟到达，从不迟到；生病时不是只会说"多喝热水"，而是已经查好了最近的药店、医院和所有注意事项。你的爱不是烟花——一瞬间的绚烂然后消失——你的爱是一座桥，每一块砖都经过精确计算，保证她能安全地走向任何她想去的地方。\n\n但你也需要警惕：秩序是你的超能力，但它也可能变成你的囚笼。当你发现自己开始因为一支笔没有放回原位而焦虑一整天，当你发现自己无法享受任何"计划外"的快乐，当你开始用同一套标准去要求身边的每一个人——那就是时候给自己的系统打一个补丁了。世界不是表格，人生不是项目，有些最美的东西恰恰生长在逻辑的缝隙里——一朵从水泥裂缝里长出来的野花，比任何园艺设计都更动人。',
        dimensionAnalysis:'秩序力大爆表（没有谁能比你更懂排列组合）、浮游感极低（拒绝情绪化、拒绝脱轨）、占位度适中（用实力说话，不屑于花哨的张扬）。',
        socialGuide:'你需要【法式冷感留白】这种同样讲规矩的同类互相同情。离【狂热逃兵】和【野生波普】越远越好，他们的存在本身就是对你秩序系统的公然挑衅。',
        selfRescue:'靠谱是你的超能力，但别让规则变成了你的囚笼。人生的代码里偶尔出个 Bug，或者波点不小心歪了一像素，其实是宇宙在送给你开盲盒的惊喜。',
        visual:{ dotSize:'medium', density:'medium', order:'strict_grid', margin:'medium', fluctuation:'very_low', colorTheme:'bauhaus_contrast' },
        styleAndSpace:'【时尚单品版型】你的衣橱应该是一个精密的"风格系统"，而非随机堆砌。推荐剪裁极其利落的硬挺西装（黑、深灰或海军蓝）、笔直垂坠的西装裤、一丝不苟的立领衬衫。每一件单品都要经得起"近看"的考验：纽扣的缝线是否等距、面料的经纬是否对齐、口袋的比例是否符合黄金分割。配饰不需要多，但必须精准：一枚包豪斯风格的几何金属胸针、一只极简 Bauhaus 风格的手表、一副线条干净的光学眼镜。鞋子推荐德比鞋或方头切尔西靴，擦得一尘不染。你不是在穿衣服，你是在用布料和剪裁在三维空间里画一幅蒙德里安的画。\n\n【撞色公式】黑 × 白 × 原色（红黄蓝），严格遵循包豪斯色彩理论。可以用大面积的灰或黑做底，用一抹纯正的克莱因蓝或正红色做"破局之笔"——但只准用一处，多了就破了规矩。\n\n【精神卧室空间】你的房间是你精神秩序的外化。书桌必须正对窗户（光线角度经过计算），台灯、笔记本、水杯三点一线。墙面保持大面积留白，只挂一幅你精选的几何抽象画——一幅就够了，多了是噪音。书架上的书按类别、高度、书脊颜色三重排序。但请在书桌角落偷偷放一件"不守规矩"的东西：一块形状不规则的鹅卵石、或者朋友送的一个手作歪扭陶碗。那是你和"失控"之间签订的一份和平协议。',
        redMatch:{ title:'灵魂互补的绝对撞色织物', partner:'法式冷感电影的无尽留白', desc:'你们是天作之合的两个"秩序星球"。她不像你那么刚性，她的秩序是柔软而优雅的——像一支用羽毛笔写的规则，不是用钢印盖的。你们在一起不需要太多语言，因为她懂你为什么要把遥控器摆正，你懂她为什么要在聚会中途悄悄离场。你们的相处像一首精妙的赋格曲：两个独立的旋律线，按照各自的逻辑运行，却奇妙地交织成和谐的和声。她是你在这个世界上少数不需要"解释自己"的人——因为你们的频率本来就是同一段代码的不同写法。' },
        blackMatch:{ title:'频率排斥的格式化剪刀', partner:'草间弥生的狂热逃兵', desc:'她对你来说是一场永无止境的视觉和精神地震。你花了一个小时整理的茶几，她经过五秒钟就能恢复成"她认为更有生活气息"的样子。你的日程表在她眼里是一张"需要被打破的束缚清单"，而她在你眼里是一个"行走的不可控变量"。最让你崩溃的不是她的行为本身，而是她做完这一切之后还笑嘻嘻地问你"是不是很可爱？"。你会在心里疯狂计算把她行为规整化所需的最小能量消耗，然后发现这个数字是无穷大。保持礼貌的距离——你们不是谁对谁错的问题，你们根本就是两套不兼容的操作系统。' },
        advices:[
          { title:'每天故意做一件"没用"的事', body:'花十分钟看云、用非惯用手写一行字、在公园长椅上坐一会儿什么都不想。这些事没有任何 KPI、没有任何产出、在你的效率体系里属于"绝对冗余"。但正是这些冗余，会让你的精神系统从一台永不停机的服务器变成一个有血有肉的人。效率不是衡量生命价值的唯一指标——一朵花不会因为不能吃就否定自己盛开的意义。' },
          { title:'在亲密关系里"降级"你的标准', body:'爱一个人，不是把他纳入你的管理体系，而是允许他以自己的方式存在。当你发现自己又在心里列"他应该改进的十件事"时，停下来，换一个角度：他身上有哪些东西是你永远做不到的？他的随性、他的莽撞、他的不按计划行事——这些不是缺陷，是他的操作系统。你不需要兼容他，你只需要欣赏他。' },
          { title:'重新定义"失控"', body:'下次当计划被打乱的时候，试着把"完了全乱了"改成"嗯，有意思"。失控不是失败，失控是宇宙在邀请你玩一个你不知道规则的新游戏。你一直以为安全来自掌控一切，但真正的安全来自相信自己有能力应对任何失控。你比你想象的要柔软得多——只是你太久没有给自己机会弯曲了。' }
        ]
      },

        coreMonologue:'你是那种会让陌生人觉得"不太好接近"，但一旦走近就再也离不开的人。你的精神世界像一部新浪潮电影——大量的空镜、克制的对白、意味深长的沉默。你不需要用语言填满每一秒，你对"留白"的驾驭能力是天生的。当别人在饭局上争先恐后地表达观点时，你安静地坐在一旁，小口喝水，嘴角挂着一丝若有若无的微笑。你不是冷漠，你只是选择性地分配能量——你的社交电量有限，不值得的人不配消耗你的格调。\n\n深夜里的你，是最接近"本我"的状态。你可能会放一张黑胶唱片，倒半杯红酒（或热牛奶），窝在沙发里看一本已经看过三遍的小说。你不觉得这是无聊——重复对你来说是一种仪式感，像反复听一首老歌，每一次都能听到新的细节。你的孤独不是寂寞，而是一种精心布置的精神空间：窗帘的厚度、灯光的色温、空气里若有若无的白噪音——每一处都是你亲自设计的，用来安放那个不愿意被世界打扰的自己。\n\n恋爱中的你是最难追也最值得追的人。你不吃欲擒故纵那一套——因为你自己的"纵"已经足够优雅了，不需要任何人的"擒"。你要的不是轰轰烈烈的告白，而是一个能和你并肩散步、各自沉默十分钟也不尴尬的人。你的爱情观是老派的：相信书信、相信眼神、相信时间。你不会很快爱上一个人，但一旦爱上了，就是那种"在战火中也会为你整理领口"的深沉。你最怕的不是不被爱，而是被爱得太廉价——那些廉价的"在吗""吃了吗""晚安"，在你看来是一种精神噪音，是对你精心维护的内在宁静的不礼貌入侵。\n\n工作里的你是一个"高智感独行侠"。你不需要靠加班到凌晨来证明自己的价值，你在下午五点准时合上电脑，因为你的效率足够在八小时内完成别人十二小时的工作量。你不参与茶水间的八卦，不代表你不合群——你只是觉得那些信息不值得占用你的大脑内存。同事对你的评价往往是"有点高冷，但非常靠谱"，这正是你最舒服的人设。你不追求被所有人喜欢，你只追求被对的人尊重。',
        dimensionAnalysis:'呼吸率极高（需要绝对的个人真空防御罩）、秩序力极高（内心有一把看不见的尺，优雅地自律）、占位度较低（冷眼旁观，不争不抢）。',
        socialGuide:'快去艾特你身边那个【草间弥生的狂热逃兵】，你是唯一能让他安静下来的特效药。离【微观神经质像素】远一点，他密密麻麻的焦虑会传染给你。',
        selfRescue:'保持冷感很酷，但也别把自己彻底冻住。偶尔允许一两颗不听话的异形波点撞进你的留白里，生活偶尔失控一下，其实蛮好玩的。',
        visual:{ dotSize:'medium', density:'medium', order:'grid', margin:'wide', fluctuation:'low', colorTheme:'hepb_blue' },
        styleAndSpace:'【时尚单品版型】你天生就是"法式衣橱"的代言人。投资几件永不过时的核心单品：一件垂坠感极佳的真丝白衬衫（解开最上面两颗扣子，露出锁骨）、一条高腰直筒黑色西装裤、一件喀什米尔羊毛的圆领针织衫（燕麦色或赫本蓝）、一双线条极简的黑色尖头平底鞋。你的穿搭哲学是"做减法"：出门前对着镜子，摘掉一件配饰——那件被摘掉的东西就是你和"过度用力"之间的最后距离。配饰只需两件：一对珍珠耳钉和一只皮质极简腕表。你的高级感来自"看起来毫不费力"，尽管你在背后花了大量时间筛选和搭配。\n\n【撞色公式】黑 × 白 × 蓝（赫本蓝或灰蓝）。可以加入极少量金色或银色金属元素作为点睛——但只限于一枚戒指或一条细链。\n\n【精神卧室空间】你的房间应该像电影《花样年华》的空镜——大面积的白墙、亚麻质感的床品、一扇能让光线斜斜地洒进来的百叶窗。家具数量极少：一张床、一盏落地灯、一把阅读椅、一个小边几——就这些，足够了。窗台上放一个细长的玻璃花瓶，插一枝尤加利叶或干花。你的空间不是空的，而是被精心编辑过的——每一样留下来的东西都经得起你长时间的凝视。墙角放一台黑胶唱片机，那是你每晚为自己播放的"精神背景音"。你的房间不邀请太多人进入，因为它是你的圣殿，不是展厅。',
        redMatch:{ title:'灵魂互补的绝对撞色织物', partner:'草间弥生的狂热逃兵', desc:'你是她生命里唯一一片能让她安静下来的海。她是一团横冲直撞的野火，你是那场恰到好处的细雨——你不会扑灭她，你只是让她烧得不那么痛。她会在你的沉默里学会不说话的舒适，你会在她的炸裂里重新感受到心跳加速的快乐。你们在一起的时候，像一部节奏完美的电影：她是高潮迭起的动作戏，你是那些意味深长的空镜——缺了谁，这部作品都不完整。她会拉着你去做你一个人永远不会做的事，而你会在她筋疲力尽时递上一杯刚好温度的水。你们互为彼此的锚和帆。' },
        blackMatch:{ title:'频率排斥的格式化剪刀', partner:'微观世界的神经质像素', desc:'她的焦虑像一种空气传播的病毒，而你对此没有抗体。你精心维护的精神留白，在她的世界里是不存在的概念——她的脑子里塞满了密密麻麻的担忧、分析和"如果"。她不是故意的，但她那种高频振动的紧张感会穿透你所有的防线，让你的内心空间变得拥挤不堪。你发现自己开始因为她的焦虑而焦虑，因为她的内耗而内耗——这完全违背了你建立边界感的初衷。善意地保持距离，不是冷漠，而是你知道自己的精神生态经不起外来物种的入侵。' },
        advices:[
          { title:'偶尔打开一扇"社交窗户"', body:'你的边界感是你最珍贵的资产，但不要让它变成一堵没有窗户的墙。每个月给自己设定一个"社交开放日"——主动联系一个你觉得有意思的人，喝杯咖啡，聊一些不痛不痒但让人放松的话题。不是为了建立人脉，而是为了确认：外面的世界没有那么危险，偶尔的闯入也不会毁掉你的内心秩序。人与人之间最舒服的距离不是无限远，而是一个你随时可以调整的、有弹性的区间。' },
          { title:'允许自己在乎', body:'你太擅长表现得"无所谓"了，以至于有时候连自己都骗了过去。下次当你发现自己其实很在意某件事或某个人时，不要习惯性地对自己说"算了，没关系"。承认在乎不是软弱——恰恰相反，敢于在乎的人才是真正有力量的人。因为只有把自己暴露在可能的失望面前，才有机会触碰到真实的喜悦。你不是一座孤岛，你是一座偶尔需要靠岸的帆船。' },

      fluctuation: {

        coreMonologue:'你是所有无聊灵魂的强心剂，是任何一个沉闷房间里最先被注意到的那个人——不是因为声音最大，而是因为你的存在本身就是一种"事件"。你的精神世界是一个没有围栏的野生动物保护区，各种奇思妙想在里面自由奔跑、杂交、变异、开出你从没见过的花。你今天觉得某件事是人生的终极意义，明天早上醒来可能已经完全忘了，因为你已经被另一个更疯狂的念头劫持了。你不是善变，你是拥有一种罕见的能力——让自己不断被新生事物重新定义。\n\n深夜的你是一个"灵感永动机"。午夜两点，你突然从床上弹起来，因为脑子里闪过一个绝妙的点子——可能是一首诗的第一句、一个创业计划的核心逻辑、或者是一种你确信没有人发明过的意面新吃法。你会在黑暗中摸索着打开手机备忘录，噼里啪啦地打下一堆只有你自己能看懂的破碎词句，然后心满意足地躺回去——至于第二天能不能把这些碎片拼成一个完整的东西，那是明天的事。对你来说，灵感到来的那一刻就已经完成了它的使命——至于它能不能被"执行"，那是属于另一个维度的、不那么有趣的讨论。\n\n恋爱中的你是一个"惊喜制造机"——但这里的"惊喜"可能包括：凌晨三点突然想去看海于是真的开车去了、在纪念日那天忘记纪念日但在第二天随机送了对方一个完全不相干但无比用心的礼物、或者在吵架到最激烈的时候突然停下来盯着对方说"你生气的样子好好看"。你不是不认真，你只是拒绝用"标准答案"来爱人。你的爱没有模板，没有套路，甚至没有可预测的路径——它像一阵风，你永远不知道下一秒它会从哪个方向吹来，但你确定它一直在这里。\n\n工作里的你是一个让老板又爱又怕的存在。爱你是因为你总能拿出让人眼前一亮的创意——那种"我怎么没想到"的东西；怕你是因为你的工作节奏完全无法被管理——你可能连续三天毫无产出，然后在第四天凌晨一次性交出质量惊人的全部成果。你不是懒，你是需要酝酿——你的创意像雷暴，需要足够长时间的闷热和压抑，才能在某个瞬间劈出最亮的闪电。不要试图用打卡机来测量你的价值，你不是机器，你是一棵按自己季节开花结果的大树。',
        dimensionAnalysis:'浮游感爆表（反骨、思维跳跃、不可控）、秩序力负数（彻底打破规则）、高密感与占位度高频交替（时而狂热如火，时而冷漠如冰）。',
        socialGuide:'你是所有无聊灵魂的强心剂！快去把【包豪斯乐园】抓过来，带他体验一把不按计划行事的疯狂快感。',
        selfRescue:'野蛮生长是非常珍贵的天赋！但记得在疯狂发散奇思妙想的同时，别把自己的现实生活过成一团乱麻。稍微留一点点秩序用来应付这个世界，剩下的用来疯狂盛开。',
        visual:{ dotSize:'varied', density:'high', order:'chaotic', margin:'uneven', fluctuation:'very_high', colorTheme:'wild_pop' },
        styleAndSpace:'【时尚单品版型】你的衣橱不应该有任何"规则"。不对称剪裁是你最好的朋友：一只袖子长一只袖子短的上衣、裙摆斜裁的半身裙、左右脚颜色不一样的袜子——这些在别人身上是"穿错了"，在你身上是"艺术"。推荐单品：涂鸦印花 oversized T 恤、撕裂感做旧牛仔外套、荧光色不规则半裙、手工编织的彩色毛线帽。材质上大胆混搭：皮革 × 蕾丝、牛仔 × 丝绸、针织 × PVC——你不是在穿衣，你是在用身体做拼贴艺术。鞋子可以是厚底松糕鞋、涂鸦帆布鞋、或者干脆踩一双颜色极其嚣张的袜子配凉鞋。\n\n【撞色公式】没有公式。把你衣柜里最不该放在一起的两种颜色穿在一起——那就是你的公式。荧光绿 × 电光紫、橙红 × 粉蓝、明黄 × 深莓果——碰撞就是你的语言。\n\n【精神卧室空间】你的房间是一个"创意考古现场"。墙面贴满你随手撕下的杂志页、电影票根、朋友写的明信片、你某个失眠夜里画在餐巾纸上的草图。不需要画框，不需要对齐，胶带一贴就是你的展览。桌上永远堆着好几本同时进行中的速写本、一本翻到一半的小说、几个正在"发酵"中的灵感便签。床上有至少三个不同图案的抱枕，没有一个和床单配套——配套是你最不需要的东西。地上放一盏会变色的 RGB 落地灯，那是你深夜灵感的神殿照明。你的房间在别人看来可能是"乱"，但你知道每一样东西都在它应该在的位置——因为"应该"是你定义的，不是宜家目录定义的。',
        redMatch:{ title:'灵魂互补的绝对撞色织物', partner:'微观世界的神经质像素', desc:'你是她精密世界里最意想不到的美丽变量。她花了一辈子试图把所有事情都想清楚，你来了之后她发现——有些事情不需要想清楚，只需要沉浸。你会把她从她的"精神实验室"里拉出来，带她去淋一场没带伞的雨、去吃一家点评上只有两颗星但你坚信很好吃的路边摊、在周二的下午翘班去公园划船。她一开始会抗拒，会计算每一个"不合理"的行为的机会成本，但慢慢地，她开始享受这种"不合理"——因为和你在一起的每一秒，她都感觉自己不是一台精密的仪器，而是一个活生生的人。而你，在她那里学会了"落地"——你的灵感不再像断线的风筝一样飘走，因为她会用她的细腻帮你把那些疯狂的想法一一接住、整理、存档。' },

    /* ── 得分计算引擎 ── */
    function calculateScores(answers) {
      console.log('[计算] 用户答案:', answers);
      // 初始每个维度 50 分
      const scores = { presence: 50, density: 50, order: 50, margin: 50, fluctuation: 50 };

      for (let i = 0; i < QUESTIONS.length; i++) {
        const answerIdx = answers[i];
        // 如果用户跳过了某题，跳过该题的权重叠加
        if (answerIdx == null || answerIdx < 0 || answerIdx >= QUESTIONS[i].options.length) continue;

        const weight = QUESTIONS[i].options[answerIdx].weight;
        for (const dim of DIMENSIONS) {
          if (weight[dim] != null) {
            scores[dim] += weight[dim];
          }
        }
      }

      // Clamp 到 0–100
      for (const dim of DIMENSIONS) {
        scores[dim] = Math.max(0, Math.min(100, Math.round(scores[dim])));
      }

      console.log('[计算] 最终得分:', JSON.stringify(scores));
      return scores;
    }

    

    /* ══════════════════════════════════════════════════════════════
       矩阵交叉拼装引擎
       ══════════════════════════════════════════════════════════════ */

    function assembleResult(scores) {
      console.log('[拼装] 开始矩阵交叉拼装');
      const safe = dim => {
        const v = scores[dim];
        return (typeof v === 'number' && !isNaN(v)) ? Math.round(v) : 50;
      };

      const ranked = DIMENSIONS.map(d => ({ dim:d, score:safe(d) }))
        .sort((a,b) => b.score - a.score);
      const mainDim = ranked[0].dim;
      let subDim   = ranked[1].dim;
      if (subDim === mainDim) subDim = ranked[2].dim;

      console.log('[拼装] 主维度:', mainDim, safe(mainDim), DIM_CHINESE[mainDim]);
      console.log('[拼装] 次维度:', subDim, safe(subDim), DIM_CHINESE[subDim]);

      const hits = [];
      for (const key of Object.keys(PREFIXES)) {
        const r = PREFIXES[key];
        const v = safe(r.cond.dim);
        const hit = (r.cond.op === '>') ? (v > r.cond.val) : (v < r.cond.val);
        if (hit) hits.push({ key, label:r.label, priority:Math.abs(v-50) });
      }
      hits.sort((a,b) => b.priority - a.priority);
      const prefixLabel = hits.length > 0 ? hits[0].label : '';

      console.log('[拼装] 触发前缀:', prefixLabel || '(无极端值)');

      const main = MAIN_FABRICS[mainDim] || MAIN_FABRICS.fluctuation;
      const sub  = SUB_BUTTONS[subDim]   || SUB_BUTTONS.fluctuation;

      const fullTitle = prefixLabel
        ? prefixLabel + ' · ' + main.title + ' 挂件 ' + sub.subTitle
        : main.title + ' 挂件 ' + sub.subTitle;

      const allTags = [...new Set([...(main.tags||[]), ...(sub.subTags||[])])];
      const uniquenessCode = DIMENSIONS.reduce((acc,d) => acc*100+safe(d), 0);

      console.log('[拼装] ✅ 完整称号:', fullTitle);
      return { fullTitle, prefix:prefixLabel, mainTitle:main.title, subTitle:sub.subTitle,
        mainDim, subDim, mainFabric:main, subButton:sub, allTags, uniquenessCode };
    }

    /* ══════════════════════════════════════════════════════════════
       Canvas 动态波点艺术布料生成器 ★ 死命令 ★
       根据 Presence / Density / Fluctuation 动态绘制专属波点画
       ══════════════════════════════════════════════════════════════ */
    function drawDotCanvas(canvas, scores, mainDim) {
      var ctx = canvas.getContext('2d');
      var W = canvas.width;
      var H = canvas.height;

      var safe = function(d) {
        var v = scores[d];
        return (typeof v === 'number' && !isNaN(v)) ? Math.round(v) : 50;
      };
      var presenceVal    = safe('presence');
      var densityVal     = safe('density');
      var fluctuationVal = safe('fluctuation');
      var marginVal      = safe('margin');
      var orderVal       = safe('order');

      // ── 网格阵列配置（根据主维度切换）──
      var bgColor, dotColor, accentColor, spacing, radius, gridOffsetX, gridOffsetY;

      if (mainDim === 'margin') {
        // ★ 法式冷感留白：极简、大面积留白、老派高智感
        bgColor     = '#FFFFFF';
        dotColor    = '#2E3A4D';
        accentColor = '#222222';
        spacing     = 40;
        radius      = 6;
        gridOffsetX = 20;
        gridOffsetY = 20;
      } else if (mainDim === 'density') {
        // ★ 微观神经质像素：极高密度、针尖细点
        bgColor     = '#FBF9F5';
        dotColor    = '#111111';
        accentColor = '#0A192F';
        spacing     = 12;
        radius      = 2;
        gridOffsetX = 6;
        gridOffsetY = 6;
      } else if (mainDim === 'presence') {
        // ★ 草间弥生狂热逃兵：强烈视觉冲击
        bgColor     = '#FFD000';
        dotColor    = '#000000';
        accentColor = '#FFFFFF';
        spacing     = 35;
        radius      = 15;
        gridOffsetX = 18;
        gridOffsetY = 18;
      } else if (mainDim === 'fluctuation') {
        // ★ 错位野生波普：撞色反骨
        bgColor     = '#FFF0F3';
        dotColor    = '#2C000E';
        accentColor = '#FF477E';
        spacing     = 30;
        radius      = 8;
        gridOffsetX = 15;
        gridOffsetY = 15;
      } else {
        // ★ order / 包豪斯乐园：几何理性
        bgColor     = '#FAFAFA';
        dotColor    = '#1A1A1A';
        accentColor = '#D4687C';
        spacing     = 28;
        radius      = 7;
        gridOffsetX = 14;
        gridOffsetY = 14;
      }

      // ── 绘制纯色背景 ──
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, W, H);

      // ── 双重循环网格阵列绘制 ──
      var col = 0;
      var row = 0;
      var margin_padding = 8; // 边缘留白

      for (var x = margin_padding + gridOffsetX; x < W - margin_padding; x += spacing) {
        row = 0;
        for (var y = margin_padding + gridOffsetY; y < H - margin_padding; y += spacing) {
          var cx = x;
          var cy = y;
          var r  = radius;

          // Fluctuation 分支：每 3 个圆制造一个撞色异形大圆
          var isAccent = false;
          if (mainDim === 'fluctuation' && (col + row) % 3 === 0) {
            isAccent = true;
            r = 18;
            // 5px 随机偏心位移
            cx += (Math.random() - 0.5) * 5;
            cy += (Math.random() - 0.5) * 5;
          }

          // 确保圆不超出画布边界
          cx = Math.max(r, Math.min(W - r, cx));
          cy = Math.max(r, Math.min(H - r, cy));

          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);

          if (isAccent) {
            ctx.fillStyle = accentColor;
          } else {
            ctx.fillStyle = dotColor;
          }
          ctx.globalAlpha = 1;
          ctx.fill();

          row++;
        }
        col++;
      }

      // ── 右下角艺术水印 ──
      var diaStr = (presenceVal * 0.4 + 2).toFixed(1);
      ctx.fillStyle = 'rgba(180, 144, 162, 0.55)';
      ctx.font = 'italic 10px "Georgia", serif';
      ctx.textAlign = 'right';
      ctx.fillText('Spec: ' + diaStr + 'mm', W - 16, H - 10);

      ctx.fillStyle = 'rgba(180, 144, 162, 0.35)';
      ctx.font = '7px "PingFang SC", sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('POLKA DOT UNIVERSE', 16, H - 10);
    }

    function selectOption(qIndex, optIndex) {
      if (isAnimating) return;
      isAnimating = true;

      userAnswers[qIndex] = optIndex;

      // 更新选中样式
      var options = document.querySelectorAll('#quiz-options .quiz-option');
      for (var i = 0; i < options.length; i++) {
        options[i].classList.remove('quiz-option--selected');
        options[i].disabled = true;

          renderResult(scores, assembled);
          switchScreen('screen-result');
          console.log('[结算] ===== 全部完成 =====');
        } catch(e) {
          console.error('[结算] 💥 致命错误:', e.message, e.stack);
          try {
            var es = { presence:50, density:50, order:50, margin:50, fluctuation:50 };
            renderResult(es, assembleResult(es));
            switchScreen('screen-result');
          } catch(e2) {
            alert('结果渲染遇到了意外问题，请刷新页面重试。');
          }
        }
      }, 3000);
    }

    function resetQuiz() {
      userAnswers = new Array(QUESTIONS.length).fill(-1);
      currentQuestion = 0;
      isAnimating = false;
      showQuestion(0);
      switchScreen('screen-quiz');
    }

    /* ── 初始化 ── */
    document.getElementById('btn-start').onclick = function() {
      resetQuiz();
    };
  </script>
</body>
</html>
